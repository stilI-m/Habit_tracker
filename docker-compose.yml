version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d habits_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: habits_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Эта строчка позволяет изменять код локально и сразу видеть результат без перезапуска Докера!
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
volumes:
  pgdata: # Сохраняем данные БД на диске, чтобы они не исчезли при перезапуске